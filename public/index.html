<!DOCTYPE html>
<html lang = "ja">
    <head>
        <meta charset="UTF-8" />
        <title>GPX経路分析</title>
        <style>
            body {
                margin: 0;
                padding: 10px;
                font-family: sans-serif;
            }
            
            #map {
                height: 400px;
                width: 100%;
            }
            #log {
                height: 150px;
                overflow-y: scroll;
                border: 1px solid #ccc;
                padding: 5px;
                margin-bottom: 10px; 
            }

            #gpxFileInput{
                display: inline-block;
                margin-bottom: 10px;
            }

            #fileNameDisplay {
                display: none;
            }
        </style>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Google Maps-->
    </head>
    <body>
        <h1>GPXデータ解析と経路判定</h1>

        <div style="background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 15px; margin-bottom: 20px;">
            <p style="margin-top: 0;"><strong>過去のログを読み込む：</strong></p>

            <input type="file" id="gpxFileInput" multiple accept=".gpx" style="margin-bottom: 10px;">

            <br>

            <button onclick="processFiles()" id="processButton" style="padding: 5px 10px; cursor: pointer;">
                GPXファイルをデータベースに保存
            </button>
            <div id="fileNameDisplay" style="font-size: 0.8em; color: #666; margin-top: 5px;">
                複数選択して一括読み読みが可能です
            </div>
        </div>

        <hr>

        <input type="text" id="destinationInput" placeholder="目的地を入力（例：東京タワー）">
        <button onclick="requestRouteDrawing()" id="drawingButton">
            ルート検索開始
        </button>

        <div id = "navControls" style="margin-top: 10px;">
            <button onclick="startNavigation()" id="routestartButton" style="display: block";>
            ルートを確認してナビ開始
            </button>

             <button onclick="stopNavigation()" id="stopButton" style="display: none;">
            ナビ停止
            </button>

            <button onclick="startNavigation()" id="startButton" style="display: none;">
            ナビ再開
            </button>
        </div>     
        
        <div id="statusLabel" style="font-weight:bold; padding:10px; background:#f0f0f0; margin-top: 10px; border-radius: 5px;">
            状態：待機中
        </div>

        <div id="nav-panel" style="background: #333; color: white; padding: 20px; font-size: 1.4em; min-height: 80px; border-radius: 12px; margin-bottom: 15px; display: none; text-align: center; box-shadow: 0 4px15px rgba(0,0,0,0.3); border: 2px solid #555;">
            <div id="nav-instruction" style="font-weight: bold; line-height: 1.4;">目的地を入力してルートを検索してください</div>
            <div id="nav-distance" style="font-size: 0.8em; color: #ffeb3b; margin-top: 8px;"></div>
        </div>

        <div id="map" style="margin-top: 10px;"></div>

        <hr>
        <p style="font-size: 0.8em; color: #666; margin-bottom: 2px;">動作ログ</p>
        <div id="log"></div>

        <script src="utils.js"></script>
        <script src="gpx-parser.js"></script>
        <script src="gpx-analyzer.js"></script>
        <script src="route.check.js"></script>
        <script src="location-tracker.js"></script>
        <script src="map.renderer.js"></script>
        <script src = "navigation.js"></script>
        
        <script>
            var allPoints = [];
            var frequentPoints = [];
            var map;
            var gpxProcessed = false;
            var directionsService;
            var directionsRenderer;
            var frequentCircles = [];
            var currentLocationMarker = null;
            var watchId = null;
            var pathLog = [];
            var navigationTimer = null;
            var isUserInteracting = false;
            var interactionTimeout = null;
            var destinationMarker = null;
            
            async function loadGoogleMaps() {
                try {
                    const res = await fetch("/api/get-api-key");
                    if (!res.ok) throw new  Error("APIキーの取得に失敗しました");
                    const data = await res.json();
                    const API_KEY = data.key;

                    if (!API_KEY) {
                        logMessage("Google Maps APIキーが設定されてません");
                        return;
                    }

                    window.MAPS_API_KEY = API_KEY;

                    ((g) => {
                        var h, a, k, p = "The Google Maps Javascript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window;
                        b = b[c] || (b[c] = {});
                        var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => {
                            await (a = m.createElement("script"));
                            e.set("libraries", [...r] + "");
                            for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                            e.set("callback", c + ".maps." + q);
                            a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
                            d[q] = f;
                            a.onerror = () => h = n(Error(p + " could not load. "));
                            a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                            m.head.append(a)
                        }));
                        d[l] ? console.warn(p + " only loads once. RE-referencing library %s.", r) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l] (f, ...n))
                    })({
                        key: API_KEY,
                        v: "weekly",
                    });

                    await google.maps.importLibrary("maps");
                    await google.maps.importLibrary("routes");
                    await google.maps.importLibrary("places");

                    if (typeof initMap === "function"){
                        initMap();
                        logMessage("Google Maps ロード完了");
                    }        
                } catch (error) {
                    logMessage(`APIキーのロードエラー： ${error.message}`);
                    console.error("APIキーロードエラー", error);
                }
            }

            window.addEventListener("DOMContentLoaded", loadGoogleMaps);

            window.addEventListener("load", async () => {
                setTimeout(async () => {
                    try {
                        logMessage("保存済みのログを確認しています");
                        const allSaveData = await getAllPointsFromDB();

                        if (allSaveData && allSaveData.length > 0) {
                            allPoints = allSaveData.map(d => ({ lat: d.lat, lon: d.lon, time: d.time }));
                            logMessage(`合計 ${allPoints.length} 地点の過去ログを読み込みました`);

                            calculateFrequentPoints();
                            gpxProcessed = true;

                            if (typeof drawMap === 'function') drawMap();
                        } else {
                            logMessage("保存されたログがありません。新しいGPXファイルを読み込んでください");
                        }
                    } catch (e) {
                        console.error("初期読み込みエラー:", e);
                    }
                }, 1500);
            });

                const points =await getAllPointsFromDB();
                const counterElement = document.getElementById('logCont');
                if (counterElement) {
                    counterElement.innerText = '保存済みログ： ${points.length} 地点';

        </script>


    </body>
</html>
