<!DOCTYPE html>
<html lang = "ja">
    <head>
        <meta charset="UTF-8" />
        <title>GPX経路分析</title>
        <style>
            body {
                margin: 0;
                padding: 10px;
                font-family: sans-serif;
            }
            
            #map {
                height: 400px;
                width: 100%;
            }
            #log {
                height: 150px;
                overflow-y: scroll;
                border: 1px solid #ccc;
                padding: 5px;
                margin-bottom: 10px; 
            }

            #gpxFileInput{
                display: none;
            }

            #fileNameDisplay {
                display: none;
            }
        </style>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Google Maps-->
    </head>
    <body>
        <h1>GPXデータ解析と経路判定</h1>

        <label for="gpxFile" class="custom-file-upload"></label>
        <input type="file" id="gpxFileInput" multiple>
        <span id="fileNameDisplay">ファイルが選択されていません</span>

        <button onclick="processFiles()" id="processButton">GPXファイルを読み込み・処理</button>

        <hr>

        <input type="text" id="destinationInput" placeholder="目的地を入力（例：東京タワー）">
        <button onclick="requestRouteDrawing()" id="drawingButton">
            ルート検索開始
        </button>

        <hr>

        <button onclick="startNavigation()" id="startButton">
            ナビゲーション開始
        </button>
        <button onclick="stopNavigation()" id="stopButton" style="display: none;">
            ナビゲーション停止
        </button>




        <div id="log">ログ</div>
        <div id="map"></div>
        <div id="statusLabel" style="font-weight:bold; padding:10px; background:#f0f0f0;">
            状態：待機中
        </div>

        <script src="utils.js"></script>
        <script src="gpx-parser.js"></script>
        <script src="gpx-analyzer.js"></script>
        <script src="route.check.js"></script>
        <script src="map.renderer.js"></script>
        <script src = "navigation.js"></script>
        <script src="location-tracker.js"></script>
        <script>
            var allPoints = [];
            var frequentPoints = [];
            var map;
            var gpxProcessed = false;
            var directionsService;
            var directionsRenderer;
            var frequentCircles = [];
            var currentLocationMarker = null;
            
            async function loadGoogleMaps() {
                try {
                    const res = await fetch("/api/get-api-key");
                    if (!res.ok) throw new  Error("APIキーの取得に失敗しました");
                    const data = await res.json();
                    const API_KEY = data.key;

                    if (!API_KEY) {
                        logMessage("Google Maps APIキーが設定されてません");
                        return;
                    }

                    window.MAPS_API_KEY = API_KEY;

                    ((g) => {
                        var h, a, k, p = "The Google Maps Javascript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window;
                        b = b[c] || (b[c] = {});
                        var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => {
                            await (a = m.createElement("script"));
                            e.set("libraries", [...r] + "");
                            for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                            e.set("callback", c + ".maps." + q);
                            a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
                            d[q] = f;
                            a.onerror = () => h = n(Error(p + " could not load. "));
                            a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                            m.head.append(a)
                        }));
                        d[l] ? console.warn(p + " only loads once. RE-referencing library %s.", r) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l] (f, ...n))
                    })({
                        key: API_KEY,
                        v: "weekly",
                    });

                    await google.maps.importLibrary("maps");
                    await google.maps.importLibrary("routes")

                    if (typeof initMap === "function"){
                        initMap();
                        logMessage("Google Maps ロード完了");
                    }        
                } catch (error) {
                    logMessage(`APIキーのロードエラー： ${error.message}`);
                    console.error("APIキーロードエラー", error);
                }
            }

            window.addEventListener("DOMContentLoaded", loadGoogleMaps);

            async function processFiles() {
                allPoints = [];

                // --- サーバー上の GPX ファイルを取得 ---
                try {
                    const res = await fetch("/api/gpx");
                    if (res.ok) {
                        const serverFiles = await res.json();
                        for (const file of serverFiles) {
                            const gpxRes = await fetch(`/api/gpx/${file}`);
                            const gpxText = await gpxRes.text();
                            const points = parseGpx(gpxText);
                            allPoints.push(...points);
                            logMessage(`${file}を読み込みました`);
                        }
                    }
                } catch (e) {
                    console.log("サーバーGPX読み込みスキップ又は失敗");
                }
    
                // --- ユーザーアップロードファイルの処理 ---
                const fileInput = document.getElementById('gpxFileInput');
                const userFiles = fileInput.files;

                if (userFiles) {
                    for (let i = 0; i < userFiles.length; i++) {
                    const gpxText = await userFiles[i].text();
                    const points = parseGpx(gpxText);
                    allPoints.push(...points);
                    logMessage(`アップロードファイル　${userFiles[i].name} を追加しました`);
                    } 
                }

                if (allPoints.length > 0) {
                    gpxProcessed = true;
                    calculateFrequentPoints();
                    drawMap();
                    logMessage("GPX処理完了");
                } else {
                    logMessage("有効なGPXポイントが見つかりませんでした");
                    }
            }

        </script>


    </body>
</html>
